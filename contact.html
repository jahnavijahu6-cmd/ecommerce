<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | DEE Hamper Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-[#FFFBF5]">
    <nav class="flex justify-between items-center px-10 py-6 bg-white shadow-sm">
        <div class="text-2xl font-serif">DEE STUDIO</div>
        <div class="space-x-8 text-sm uppercase">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
            <a href="about.html">Our Story</a>
            <a href="contact.html" class="font-bold border-b border-stone-800">Contact</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto py-20 px-6 grid grid-cols-1 md:grid-cols-2 gap-20">
        <div>
            <h1 class="text-5xl font-serif mb-6">Let's Talk</h1>
            <p class="text-stone-500 mb-10">For bulk inquiries, wedding hampers, or just a quick hello.</p>
            <div class="space-y-4 font-medium">
                <p>📍 Hyderabad, India</p>
                <p>📱 +91 98765 43210</p>
                <p>✉️ hello@deehampers.com</p>
            </div>
        </div>
        <form class="space-y-6">
            <input type="text" placeholder="Your Name" class="w-full p-4 bg-white border border-stone-200 focus:outline-[#F7E1D7]">
            <input type="email" placeholder="Email Address" class="w-full p-4 bg-white border border-stone-200 focus:outline-[#F7E1D7]">
            <textarea placeholder="How can we help?" class="w-full p-4 bg-white border border-stone-200 h-40 focus:outline-[#F7E1D7]"></textarea>
            <button class="w-full bg-stone-800 text-white py-4 uppercase text-xs tracking-widest font-bold hover:bg-stone-700">Send Message</button>
        </form>
    </div>
</body>
</html>
